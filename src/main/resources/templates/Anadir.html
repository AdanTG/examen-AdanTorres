<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar curso</title>
</head>
<body>
<h1>Agregar curso online</h1>

<form action="/Cursos" method="get">
    <p>
        <label for="id">ID:</label><br>
        <input type="number" id="id" name="id">
    </p>
    <p>
        <label for="titulo">Título:</label><br>
        <input type="text" id="titulo" name="titulo">
    </p>
    <p>
        <label for="plataforma">Plataforma:</label><br>
        <input type="text" id="plataforma" name="plataforma">
    </p>
    <p>
        <label for="duracion">Duración:</label><br>
        <input type="number" id="duracion" name="duracion">
    </p>
    <p>
        <label for="nivel">Nivel:</label><br>
        <input type="text" id="nivel" name="nivel">
    </p>
    <button type="submit">Agregar</button>
    <a href="/Cursos">Cancelar</a>
</form>
</body>
</html>
